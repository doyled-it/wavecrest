name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    # macos-14 is Apple Silicon (arm64) and free for public repos.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build bundle
        run: bash scripts/build.sh

      - name: Verify architecture
        run: |
          file dist/wavecrest-bundle/wavecrest
          file dist/wavecrest-bundle/wavecrest | grep -q "arm64"

      - name: Package tarball
        id: package
        run: |
          set -euo pipefail
          TARBALL="wavecrest-darwin-arm64.tar.gz"
          tar -czf "$TARBALL" -C dist/wavecrest-bundle .
          shasum -a 256 "$TARBALL" | awk '{print $1"  "$2}' > "$TARBALL.sha256"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "checksum=$TARBALL.sha256" >> "$GITHUB_OUTPUT"
          ls -lh "$TARBALL" "$TARBALL.sha256"

      - name: Extract tag annotation
        id: tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Annotated tag body if present, otherwise empty
          BODY=$(git for-each-ref "refs/tags/$TAG" --format='%(contents)' || true)
          {
            echo "body<<__EOF__"
            echo "$BODY"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.tag.outputs.body }}
          files: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.checksum }}
