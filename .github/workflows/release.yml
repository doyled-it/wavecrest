name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    # macos-14 is Apple Silicon (arm64) and free for public repos. Cross-compiling
    # to darwin-x64 with `bun build --target` works fine from arm64.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build bundles (arm64 + x64)
        run: bash scripts/build.sh darwin-arm64 darwin-x64

      - name: Verify architectures
        run: |
          file dist/wavecrest-bundle-darwin-arm64/wavecrest | tee /tmp/arm.txt
          file dist/wavecrest-bundle-darwin-x64/wavecrest   | tee /tmp/x64.txt
          grep -q "arm64"  /tmp/arm.txt
          grep -q "x86_64" /tmp/x64.txt

      - name: Package tarballs
        id: package
        run: |
          set -euo pipefail
          for ARCH in arm64 x64; do
            TARBALL="wavecrest-darwin-${ARCH}.tar.gz"
            tar -czf "$TARBALL" -C "dist/wavecrest-bundle-darwin-${ARCH}" .
            shasum -a 256 "$TARBALL" | awk '{print $1"  "$2}' > "$TARBALL.sha256"
            ls -lh "$TARBALL" "$TARBALL.sha256"
          done

      - name: Extract tag annotation
        id: tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          BODY=$(git for-each-ref "refs/tags/$TAG" --format='%(contents)' || true)
          {
            echo "body<<__EOF__"
            echo "$BODY"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.tag.outputs.body }}
          files: |
            wavecrest-darwin-arm64.tar.gz
            wavecrest-darwin-arm64.tar.gz.sha256
            wavecrest-darwin-x64.tar.gz
            wavecrest-darwin-x64.tar.gz.sha256
