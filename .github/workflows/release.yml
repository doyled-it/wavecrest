name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    # macos-14 is Apple Silicon (arm64) and free for public repos. Cross-compiling
    # to darwin-x64 with `bun build --target` works fine from arm64.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build bundles (arm64 + x64)
        run: bash scripts/build.sh darwin-arm64 darwin-x64

      - name: Verify architectures
        run: |
          file dist/wavecrest-bundle-darwin-arm64/wavecrest | tee /tmp/arm.txt
          file dist/wavecrest-bundle-darwin-x64/wavecrest   | tee /tmp/x64.txt
          grep -q "arm64"  /tmp/arm.txt
          grep -q "x86_64" /tmp/x64.txt

      - name: Package tarballs
        id: package
        run: |
          set -euo pipefail
          for ARCH in arm64 x64; do
            TARBALL="wavecrest-darwin-${ARCH}.tar.gz"
            tar -czf "$TARBALL" -C "dist/wavecrest-bundle-darwin-${ARCH}" .
            shasum -a 256 "$TARBALL" | awk '{print $1"  "$2}' > "$TARBALL.sha256"
            ls -lh "$TARBALL" "$TARBALL.sha256"
          done

      - name: Extract tag annotation
        id: tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          BODY=$(git for-each-ref "refs/tags/$TAG" --format='%(contents)' || true)
          {
            echo "body<<__EOF__"
            echo "$BODY"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.tag.outputs.body }}
          files: |
            wavecrest-darwin-arm64.tar.gz
            wavecrest-darwin-arm64.tar.gz.sha256
            wavecrest-darwin-x64.tar.gz
            wavecrest-darwin-x64.tar.gz.sha256

      - name: Bump tap formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::TAP_GITHUB_TOKEN not set; skipping tap bump"
            exit 0
          fi

          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          ARM_SHA=$(shasum -a 256 wavecrest-darwin-arm64.tar.gz | awk '{print $1}')
          X64_SHA=$(shasum -a 256 wavecrest-darwin-x64.tar.gz   | awk '{print $1}')

          echo "tag=$TAG version=$VERSION"
          echo "arm64=$ARM_SHA"
          echo "x64=$X64_SHA"

          WORKDIR="$RUNNER_TEMP/tap"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/doyled-it/homebrew-wavecrest.git" "$WORKDIR"
          cd "$WORKDIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Rewrite version line and both sha256 lines. Use awk for clarity over
          # nested sed substitutions — each sha is gated by the on_arm/on_intel
          # block it follows, so we track which block we're in.
          awk -v ver="$VERSION" -v arm="$ARM_SHA" -v x64="$X64_SHA" '
            /^  version "/ { print "  version \"" ver "\""; next }
            /on_arm do/     { block = "arm"; print; next }
            /on_intel do/   { block = "x64"; print; next }
            /^      sha256 "/ {
              if (block == "arm") print "      sha256 \"" arm "\""
              else if (block == "x64") print "      sha256 \"" x64 "\""
              else print
              next
            }
            { print }
          ' Formula/wavecrest.rb > Formula/wavecrest.rb.new
          mv Formula/wavecrest.rb.new Formula/wavecrest.rb

          if git diff --quiet; then
            echo "tap formula already up to date; nothing to push"
            exit 0
          fi

          git add Formula/wavecrest.rb
          MSG_FILE="$RUNNER_TEMP/commit-msg"
          {
            echo "chore: bump wavecrest to $TAG"
            echo
            echo "Auto-generated by the wavecrest release workflow:"
            echo "- arm64: $ARM_SHA"
            echo "- x64:   $X64_SHA"
          } > "$MSG_FILE"
          git commit -F "$MSG_FILE"
          git push origin main
          echo "tap formula bumped to $TAG"
